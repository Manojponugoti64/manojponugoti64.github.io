<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Music - Manoj's Blog</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script src="sidebar.js" defer></script>
    <style>
        .music-shell { margin-top: 1.5rem; }
        .bc-player-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.6rem; box-shadow: 0 4px 15px var(--shadow); display: flex; gap: 1.8rem; }
        .bc-cover-wrapper { width: 160px; height: 160px; flex: 0 0 auto; border-radius: 6px; overflow: hidden; background: var(--bg-secondary); border: 1px solid var(--border); }
        .bc-cover-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .bc-cover-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 2.5rem; background: linear-gradient(135deg, var(--bg-secondary), var(--border)); }
        .bc-player-body { flex: 1; min-width: 0; }
        .bc-album-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--accent); line-height: 1.2; }
        .bc-artist-name { color: var(--text-secondary); font-size: 0.95rem; margin: 0.25rem 0 1rem; }
        .bc-audio-controls { display: flex; align-items: center; gap: 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 1rem; }
        .bc-play-btn, .bc-nav-btn { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: color 0.2s, border-color 0.2s, background 0.2s; }
        .bc-play-btn { width: 42px; height: 42px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; flex-shrink: 0; }
        .bc-play-btn:hover, .bc-nav-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(232,112,64,0.06); }
        .bc-play-btn svg, .bc-nav-btn svg { fill: currentColor; }
        .bc-play-btn svg { width: 18px; height: 18px; }
        .bc-nav-btn svg { width: 16px; height: 16px; }
        .bc-scrubber-container { flex: 1; min-width: 0; }
        .bc-scrubber { width: 100%; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer; overflow: hidden; }
        .bc-progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 3px; }
        .bc-time-display { display: flex; gap: 0.5rem; margin-top: 0.25rem; font-size: 0.75rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
        .bc-nav-btns { display: flex; gap: 0.35rem; }
        .bc-nav-btn { width: 32px; height: 32px; background: transparent; border: 0; border-radius: 4px; }
        .bc-tracklist { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .bc-track-row { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border: 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; background: transparent; color: inherit; font-family: inherit; font-size: 0.95rem; text-align: left; }
        .bc-track-row:last-child { border-bottom: 0; }
        .bc-track-row:hover { background: rgba(232,112,64,0.05); }
        .bc-track-row.active { background: rgba(232,112,64,0.08); border-left: 3px solid var(--accent); font-weight: 600; }
        .bc-track-title { display: flex; align-items: baseline; gap: 0.5rem; min-width: 0; color: var(--text-primary); }
        .bc-track-main { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bc-track-artist { color: var(--text-secondary); font-style: italic; font-size: 0.85rem; white-space: nowrap; }
        .bc-track-row.active .bc-track-title { color: var(--accent); }
        .bc-track-duration { color: var(--text-secondary); white-space: nowrap; font-variant-numeric: tabular-nums; }
        .bc-youtube-wrap { margin-top: 1rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16 / 9; }
        .bc-youtube-wrap[hidden] { display: none; }
        .bc-youtube-wrap iframe { display: block; width: 100%; height: 100%; border: 0; }
        @media (max-width: 768px) { .bc-player-card { flex-direction: column; } .bc-cover-wrapper { width: 100%; height: 200px; } .bc-audio-controls { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <a class="logo" href="index.html">Manoj's Blog</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="photos.html">Photos</a></li>
                <li><a href="music.html">Music</a></li>
                <li><a href="iss-tracker/">ISS Tracker</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-content">
            <h1>Music</h1>
            <p class="page-sub">Tracks, favorites, and soundscapes.</p>

            <section class="music-shell" aria-label="Music player">
                <article class="bc-player-card" id="player-currents">
                    <div class="bc-cover-wrapper">
                        <img src="https://raw.githubusercontent.com/Manojponugoti64/manojponugoti64.github.io/26fc5bb/images/tame_impala_currents_cover.png" alt="Currents cover" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'bc-cover-placeholder', innerHTML:'&#9835;'}));">
                    </div>
                    <div class="bc-player-body">
                        <div class="bc-album-title">Currents</div>
                        <div class="bc-artist-name">by Tame Impala</div>

                        <div class="bc-audio-controls">
                            <button class="bc-play-btn" type="button" aria-label="Play selected song">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                            <div class="bc-scrubber-container">
                                <div class="bc-scrubber"><div class="bc-progress-fill"></div></div>
                                <div class="bc-time-display"><span class="bc-current-time">00:00</span><span>/</span><span class="bc-total-time">03:36</span></div>
                            </div>
                            <div class="bc-nav-btns">
                                <button class="bc-nav-btn bc-prev-btn" type="button" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                                <button class="bc-nav-btn bc-next-btn" type="button" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
                            </div>
                        </div>

                        <div class="bc-tracklist">
                            <button class="bc-track-row" type="button" data-track="0">
                                <span class="bc-track-title"><span>1.</span><span class="bc-track-main">The Less I Know The Better</span></span>
                                <span class="bc-track-duration">03:36</span>
                            </button>
                            <button class="bc-track-row" type="button" data-track="1">
                                <span class="bc-track-title"><span>2.</span><span class="bc-track-main">Dracula</span></span>
                                <span class="bc-track-duration">03:53</span>
                            </button>
                            <button class="bc-track-row" type="button" data-track="2">
                                <span class="bc-track-title"><span>3.</span><span class="bc-track-main">What You Wanted</span><span class="bc-track-artist">by OneRepublic</span></span>
                                <span class="bc-track-duration">04:01</span>
                            </button>
                        </div>

                        <div class="bc-youtube-wrap" hidden>
                            <iframe id="youtubePlayer" title="OneRepublic - What You Wanted full song" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-social">
            <a href="mailto:ponugotimanojkumar@gmail.com" class="social-link" aria-label="Email Manoj">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                <span>ponugotimanojkumar@gmail.com</span>
            </a>
        </div>
    </footer>

    <script>
        (function () {
            var tracks = [
                { title: 'The Less I Know The Better', duration: '03:36', src: 'https://bobdylanwrotepropagandasongs.wordpress.com/wp-content/uploads/2015/08/07-the-less-i-know-the-better.mp3' },
                { title: 'Dracula', duration: '03:53', src: 'https://raw.githubusercontent.com/Manojponugoti64/manojponugoti64.github.io/26fc5bb/music/dracula.mp3' },
                { title: 'What You Wanted', duration: '04:01', youtubeId: 'FeNcYRusSkY' }
            ];
            var audio = new Audio();
            var active = -1;
            var isPlaying = false;
            var rows = Array.prototype.slice.call(document.querySelectorAll('.bc-track-row'));
            var playBtn = document.querySelector('.bc-play-btn');
            var prevBtn = document.querySelector('.bc-prev-btn');
            var nextBtn = document.querySelector('.bc-next-btn');
            var fill = document.querySelector('.bc-progress-fill');
            var currentTime = document.querySelector('.bc-current-time');
            var totalTime = document.querySelector('.bc-total-time');
            var youtubeWrap = document.querySelector('.bc-youtube-wrap');
            var youtubePlayer = document.getElementById('youtubePlayer');

            function playIcon() { return '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; }
            function pauseIcon() { return '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; }
            function formatTime(secs) {
                if (isNaN(secs) || secs === Infinity) return '00:00';
                var m = Math.floor(secs / 60);
                var s = Math.floor(secs % 60);
                return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
            }
            function stopYouTube() {
                youtubePlayer.src = '';
                youtubeWrap.hidden = true;
            }
            function updateUI() {
                rows.forEach(function (row, idx) { row.classList.toggle('active', idx === active); });
                playBtn.innerHTML = isPlaying ? pauseIcon() : playIcon();
                playBtn.setAttribute('aria-label', isPlaying ? 'Pause selected song' : 'Play selected song');
                var track = tracks[active] || tracks[0];
                totalTime.textContent = track.duration;
                if (track.youtubeId) {
                    fill.style.width = '0%';
                    currentTime.textContent = '00:00';
                }
            }
            function playTrack(index) {
                var track = tracks[index];
                if (!track) return;
                if (active === index && !track.youtubeId) {
                    if (audio.paused) audio.play().catch(console.error);
                    else audio.pause();
                    return;
                }
                active = index;
                if (track.youtubeId) {
                    audio.pause();
                    audio.removeAttribute('src');
                    audio.load();
                    isPlaying = true;
                    youtubePlayer.src = 'https://www.youtube.com/embed/' + track.youtubeId + '?autoplay=1&rel=0';
                    youtubeWrap.hidden = false;
                    youtubeWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    updateUI();
                    return;
                }
                stopYouTube();
                audio.src = track.src;
                audio.load();
                audio.play().then(function () { isPlaying = true; updateUI(); }).catch(console.error);
                updateUI();
            }
            rows.forEach(function (row) {
                row.addEventListener('click', function () { playTrack(parseInt(row.dataset.track, 10)); });
            });
            playBtn.addEventListener('click', function () { playTrack(active === -1 ? 0 : active); });
            prevBtn.addEventListener('click', function () { playTrack(active > 0 ? active - 1 : 0); });
            nextBtn.addEventListener('click', function () { playTrack(active < tracks.length - 1 ? active + 1 : 0); });
            audio.addEventListener('play', function () { isPlaying = true; updateUI(); });
            audio.addEventListener('pause', function () { isPlaying = false; updateUI(); });
            audio.addEventListener('timeupdate', function () {
                if (isNaN(audio.duration)) return;
                fill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                currentTime.textContent = formatTime(audio.currentTime);
                totalTime.textContent = formatTime(audio.duration);
            });
            audio.addEventListener('ended', function () { playTrack(active < tracks.length - 1 ? active + 1 : 0); });
            updateUI();
        })();
    </script>
</body>
</html>
