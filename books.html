    <main>
        <div class="page-content">
            <h1>Books</h1>
            <p class="page-sub">What I&#39;m reading, what I&#39;ve finished, and what&#39;s waiting on the shelf.</p>

            <div class="books-filters">
                <button class="books-filter-btn active" data-filter="all">All Books</button>
                <button class="books-filter-btn" data-filter="reading">Reading</button>
                <button class="books-filter-btn" data-filter="completed">Completed</button>
                <button class="books-filter-btn" data-filter="want-to-read">Want to Read</button>
            </div>

            <div id="booksGrid" class="books-grid" aria-live="polite"></div>
            <p id="booksEmpty" class="photo-empty" style="display:none;">No books yet — check back soon.</p>
        </div>
    </main>

    <!-- Book Detail Overlay -->
    <div id="bookDetailOverlay" class="book-detail-overlay" aria-hidden="true">
        <div class="book-detail-inner">
            <button class="book-detail-back" id="bookDetailCloseBtn" aria-label="Close detail view">&larr;</button>
            <div class="book-detail-hero">
                <img id="bookDetailImg" src="" alt="">
            </div>
            <div class="book-detail-content">
                <div class="book-detail-badge" id="bookDetailBadge"></div>
                <h1 id="bookDetailTitle" class="book-detail-title"></h1>
                <div class="book-detail-meta">
                    <span id="bookDetailAuthor" class="book-detail-author"></span>
                    <span id="bookDetailGenre" class="book-detail-genre"></span>
                </div>
                <div id="bookDetailRating" class="book-detail-rating"></div>
                <blockquote id="bookDetailQuote" class="book-detail-quote"></blockquote>
                <p id="bookDetailNote" class="book-detail-note"></p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var grid = document.getElementById('booksGrid');
            var emptyMsg = document.getElementById('booksEmpty');
            var overlay = document.getElementById('bookDetailOverlay');
            var closeBtn = document.getElementById('bookDetailCloseBtn');
            var filters = document.querySelectorAll('.books-filter-btn');

            var allBooks = [];
            var activeFilter = 'all';

            /* ── Detail overlay helpers ── */
            function openDetail(book) {
                document.getElementById('bookDetailImg').src = book.cover;
                document.getElementById('bookDetailImg').alt = book.title;
                document.getElementById('bookDetailTitle').textContent = book.title;
                document.getElementById('bookDetailAuthor').textContent = book.author;
                document.getElementById('bookDetailGenre').textContent = book.genre;
                document.getElementById('bookDetailQuote').textContent = '"' + book.quote + '"';
                document.getElementById('bookDetailNote').textContent = book.note;

                var badge = document.getElementById('bookDetailBadge');
                badge.textContent = statusLabel(book.status);
                badge.className = 'book-detail-badge book-badge-' + book.status;

                var stars = '';
                for (var s = 0; s < 5; s++) stars += s < book.rating ? '★' : '☆';
                document.getElementById('bookDetailRating').textContent = stars;

                overlay.classList.add('is-open');
                overlay.setAttribute('aria-hidden', 'false');
                document.body.classList.add('lightbox-open');
            }
            function closeDetail() {
                overlay.classList.remove('is-open');
                overlay.setAttribute('aria-hidden', 'true');
                document.body.classList.remove('lightbox-open');
            }
            closeBtn.addEventListener('click', closeDetail);
            overlay.addEventListener('click', function (e) { if (e.target === overlay) closeDetail(); });
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDetail(); });

            /* ── Status helpers ── */
            function statusLabel(s) {
                if (s === 'reading') return 'Currently Reading';
                if (s === 'completed') return 'Completed';
                if (s === 'want-to-read') return 'Want to Read';
                return s;
            }

            /* ── Render grid ── */
            function renderBooks(books) {
                grid.innerHTML = '';
                if (!books.length) { emptyMsg.style.display = ''; return; }
                emptyMsg.style.display = 'none';

                books.forEach(function (book, idx) {
                    var card = document.createElement('button');
                    card.type = 'button';
                    card.className = 'book-card';
                    card.setAttribute('aria-label', 'View details: ' + book.title);
                    card.style.animationDelay = (idx * 0.07) + 's';

                    var coverWrap = document.createElement('div');
                    coverWrap.className = 'book-cover-wrapper';
                    var img = document.createElement('img');
                    img.className = 'book-cover';
                    img.src = book.cover;
                    img.alt = book.title + ' by ' + book.author;
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    coverWrap.appendChild(img);

                    var badge = document.createElement('span');
                    badge.className = 'book-badge book-badge-' + book.status;
                    badge.textContent = statusLabel(book.status);

                    var info = document.createElement('div');
                    info.className = 'book-card-info';

                    var title = document.createElement('div');
                    title.className = 'book-card-title';
                    title.textContent = book.title;

                    var author = document.createElement('div');
                    author.className = 'book-card-author';
                    author.textContent = book.author;

                    var stars = document.createElement('div');
                    stars.className = 'book-card-rating';
                    var starStr = '';
                    for (var s = 0; s < 5; s++) starStr += s < book.rating ? '★' : '☆';
                    stars.textContent = starStr;

                    info.appendChild(title);
                    info.appendChild(author);
                    info.appendChild(stars);

                    card.appendChild(coverWrap);
                    card.appendChild(badge);
                    card.appendChild(info);

                    card.addEventListener('click', function () { openDetail(book); });
                    grid.appendChild(card);
                });
            }

            /* ── Filtering ── */
            function applyFilter() {
                var filtered = activeFilter === 'all'
                    ? allBooks
                    : allBooks.filter(function (b) { return b.status === activeFilter; });
                renderBooks(filtered);
            }

            filters.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    filters.forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    activeFilter = btn.dataset.filter;
                    applyFilter();
                });
            });

            /* ── Load manifest ── */
            fetch('books/manifest.json?cb=' + Date.now())
                .then(function (r) {
                    if (!r.ok) throw new Error('Failed to load books (' + r.status + ').');
                    return r.json();
                })
                .then(function (data) {
                    allBooks = (data && data.books) || [];
                    applyFilter();
                })
                .catch(function (err) {
                    console.error(err);
                    emptyMsg.style.display = '';
                });
        })();
    </script>
</body>
