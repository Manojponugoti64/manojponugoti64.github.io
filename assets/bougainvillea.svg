<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" aria-hidden="true" focusable="false">
  <defs>
    <radialGradient id="bg-bract" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ffd8ec"/>
      <stop offset="45%" stop-color="#e95aa7"/>
      <stop offset="100%" stop-color="#a8196a"/>
    </radialGradient>
    <radialGradient id="bg-bract-deep" cx="35%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#ff9cd0"/>
      <stop offset="55%" stop-color="#c83584"/>
      <stop offset="100%" stop-color="#6d0d47"/>
    </radialGradient>
    <linearGradient id="bg-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fa36a"/>
      <stop offset="100%" stop-color="#2f5c34"/>
    </linearGradient>
    <radialGradient id="bg-stamen" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fffbe7"/>
      <stop offset="100%" stop-color="#f5c66a"/>
    </radialGradient>
  </defs>

  <!-- Main curving branch (comes in from the top-left corner, sweeps down and right) -->
  <path d="M -10 -10 C 40 60, 80 110, 130 160 S 220 250, 250 320 S 220 380, 150 395"
        fill="none" stroke="#4a3628" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Secondary branches -->
  <path d="M 60 70 C 95 78, 120 100, 150 130" fill="none" stroke="#4a3628" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 150 160 C 195 170, 215 200, 230 240" fill="none" stroke="#4a3628" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 230 260 C 260 275, 275 300, 275 345" fill="none" stroke="#4a3628" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Leaves (green ovals) distributed along the branch -->
  <g fill="url(#bg-leaf)" opacity="0.92">
    <ellipse cx="48" cy="55"  rx="16" ry="8"  transform="rotate(35 48 55)"/>
    <ellipse cx="95" cy="95"  rx="18" ry="9"  transform="rotate(50 95 95)"/>
    <ellipse cx="140" cy="145" rx="20" ry="10" transform="rotate(60 140 145)"/>
    <ellipse cx="118" cy="118" rx="15" ry="7"  transform="rotate(20 118 118)"/>
    <ellipse cx="185" cy="200" rx="22" ry="11" transform="rotate(70 185 200)"/>
    <ellipse cx="215" cy="245" rx="18" ry="9"  transform="rotate(55 215 245)"/>
    <ellipse cx="250" cy="300" rx="20" ry="10" transform="rotate(80 250 300)"/>
    <ellipse cx="180" cy="340" rx="16" ry="8"  transform="rotate(100 180 340)"/>
  </g>

  <!-- Bougainvillea bract clusters. Each is 3 triangular petals + a tiny yellow stamen. -->
  <!-- Cluster 1 -->
  <g transform="translate(70 30) rotate(-15)">
    <path d="M 0 0 Q 25 -30 35 -5 Q 20 8 0 0 Z" fill="url(#bg-bract)"/>
    <path d="M 0 0 Q 5 -30 -25 -20 Q -15 5 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q -30 10 -15 30 Q 5 20 0 0 Z" fill="url(#bg-bract)"/>
    <circle cx="0" cy="0" r="3" fill="url(#bg-stamen)"/>
  </g>

  <!-- Cluster 2 -->
  <g transform="translate(170 90) rotate(25)">
    <path d="M 0 0 Q 30 -35 45 -5 Q 25 12 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q 10 -38 -25 -28 Q -18 8 0 0 Z" fill="url(#bg-bract)"/>
    <path d="M 0 0 Q -38 10 -20 38 Q 8 25 0 0 Z" fill="url(#bg-bract-deep)"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#bg-stamen)"/>
  </g>

  <!-- Cluster 3 -->
  <g transform="translate(245 170) rotate(50)">
    <path d="M 0 0 Q 26 -30 38 -4 Q 22 10 0 0 Z" fill="url(#bg-bract)"/>
    <path d="M 0 0 Q 6 -32 -28 -22 Q -16 6 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q -32 8 -16 32 Q 6 22 0 0 Z" fill="url(#bg-bract)"/>
    <circle cx="0" cy="0" r="3" fill="url(#bg-stamen)"/>
  </g>

  <!-- Cluster 4 (bigger, focal) -->
  <g transform="translate(285 280) rotate(20)">
    <path d="M 0 0 Q 35 -40 55 -8 Q 28 16 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q 12 -45 -32 -32 Q -22 10 0 0 Z" fill="url(#bg-bract)"/>
    <path d="M 0 0 Q -45 12 -22 45 Q 10 30 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q 25 40 -8 48 Q -5 20 0 0 Z" fill="url(#bg-bract)"/>
    <circle cx="0" cy="0" r="4" fill="url(#bg-stamen)"/>
    <circle cx="3" cy="-3" r="1.8" fill="#fff8c9"/>
  </g>

  <!-- Cluster 5 -->
  <g transform="translate(170 350) rotate(-10)">
    <path d="M 0 0 Q 28 -30 40 -4 Q 22 12 0 0 Z" fill="url(#bg-bract)"/>
    <path d="M 0 0 Q 8 -34 -28 -24 Q -18 8 0 0 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 0 0 Q -34 10 -18 34 Q 8 22 0 0 Z" fill="url(#bg-bract)"/>
    <circle cx="0" cy="0" r="3.2" fill="url(#bg-stamen)"/>
  </g>

  <!-- A few fallen/floating petals for drift -->
  <g opacity="0.75">
    <path d="M 330 50 Q 345 40 350 60 Q 338 65 330 50 Z" fill="url(#bg-bract)"/>
    <path d="M 370 130 Q 388 125 388 145 Q 376 148 370 130 Z" fill="url(#bg-bract-deep)"/>
    <path d="M 360 230 Q 378 225 376 245 Q 366 248 360 230 Z" fill="url(#bg-bract)"/>
  </g>
</svg>
