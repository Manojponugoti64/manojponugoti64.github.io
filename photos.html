    <main class="pg-main">

    <!-- Immersive lightbox (Substack-style slider) -->

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button type="button" class="pg-lb-btn pg-lb-nav pg-lb-next" aria-label="Next photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <div class="pg-lb-stage">
            <div class="pg-lb-track" id="pgLbTrack">

                <img class="pg-lb-img pg-lb-slide" id="pgSlide1" alt="">

    <script>
    (function () {
        var grid = document.getElementById('pgGrid');
        var statusEl = document.getElementById('pgStatus');
        var countEl = document.getElementById('pgCount');
        var filtersEl = document.getElementById('pgFilters');
        var spotlightHost = document.getElementById('pgSpotlightHost');
        var newsflashEl = document.getElementById('pgNewsflash');
        var prefersReduced = window.matchMedia &&
            window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        var DAY = 86400000;
        var NEW_WINDOW = 14 * DAY;
        var LASTVISIT_KEY = 'pg_last_visit';

        function readLastVisit() {
            try { return parseInt(localStorage.getItem(LASTVISIT_KEY), 10) || 0; } catch (e) { return 0; }
        }
        function writeLastVisit(t) {
            try { localStorage.setItem(LASTVISIT_KEY, String(t)); } catch (e) {}
        }
        var lastVisit = readLastVisit();

        function relDate(ts) {
            var diff = Date.now() - ts;
            if (diff < 0) return 'just now';
            var d = Math.floor(diff / DAY);
            if (d <= 0) return 'today';
            if (d === 1) return 'yesterday';
            if (d < 7) return d + ' days ago';
            if (d < 14) return 'a week ago';
            if (d < 30) return Math.floor(d / 7) + ' weeks ago';
            if (d < 60) return 'a month ago';
            if (d < 365) return Math.floor(d / 30) + ' months ago';
            return new Date(ts).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
        }
        function isNew(p) { return (Date.now() - p.uploaded) < NEW_WINDOW; }
        function isFresh(p) { return lastVisit > 0 && p.uploaded > lastVisit; }

        var allPhotos = [];
        var viewPhotos = [];
        var activeTag = 'All';

        // ===== Substack-style Slider Lightbox =====
        var lb = document.getElementById('pgLightbox');
        var lbTrack = document.getElementById('pgLbTrack');
        var slides = [document.getElementById('pgSlide0'), document.getElementById('pgSlide1'), document.getElementById('pgSlide2')];
        var lbCap = document.getElementById('pgLightboxCap');
        var lbDot = lb.querySelector('.pg-lb-dot');
        var lbCount = document.getElementById('pgLightboxCount');
        var lbStage = lb.querySelector('.pg-lb-stage');
        var lbClose = lb.querySelector('.pg-lb-close');
        var lbPrev = lb.querySelector('.pg-lb-prev');
        var lbNext = lb.querySelector('.pg-lb-next');
        var lbDotsContainer = document.getElementById('pgLbDots');

        var current = 0;
        var sliding = false;
        var lastFocused = null;

        function setStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.style.display = '';
            statusEl.classList.toggle('is-error', !!isError);
        }

        function preload(i) {
            if (i < 0 || i >= viewPhotos.length) return;
            var im = new Image();
            im.src = viewPhotos[i].src;
        }

        // Build dot indicators
        function buildDots() {
            lbDotsContainer.innerHTML = '';
            var maxDots = Math.min(viewPhotos.length, 20);
            if (viewPhotos.length <= 1) { lbDotsContainer.style.display = 'none'; return; }
            lbDotsContainer.style.display = '';
            for (var i = 0; i < viewPhotos.length; i++) {
                var dot = document.createElement('button');
                dot.type = 'button';
                dot.className = 'pg-lb-dot-btn' + (i === current ? ' is-active' : '');
                dot.setAttribute('aria-label', 'Go to photo ' + (i + 1));
                dot.setAttribute('data-idx', i);
                dot.addEventListener('click', (function(idx) {
                    return function() { slideTo(idx); };
                })(i));
                lbDotsContainer.appendChild(dot);
            }
        }

        function updateDots() {
            var dots = lbDotsContainer.querySelectorAll('.pg-lb-dot-btn');
            for (var i = 0; i < dots.length; i++) {
                dots[i].classList.toggle('is-active', i === current);
            }
        }

        function updateMeta() {
            var p = viewPhotos[current];
            lbCap.textContent = p.caption || '';
            lbCap.style.display = p.caption ? '' : 'none';
            lbDot.style.display = p.caption ? '' : 'none';
            lbCount.textContent = relDate(p.uploaded) + '  \u00b7  ' + (current + 1) + ' / ' + viewPhotos.length;
        }

        function loadSlide(slideEl, photoIdx) {
            if (photoIdx < 0 || photoIdx >= viewPhotos.length) {
                slideEl.src = '';
                slideEl.alt = '';
                return;
            }
            var p = viewPhotos[photoIdx];
            slideEl.src = p.src;
            slideEl.alt = p.caption || 'Photograph ' + (photoIdx + 1);
        }

        // Position slides: center = current, left = prev, right = next
        function positionSlides(animate) {
            var dur = (animate && !prefersReduced) ? '0.4s' : '0s';
            lbTrack.style.transition = 'transform ' + dur + ' cubic-bezier(0.22, 0.61, 0.36, 1)';
            lbTrack.style.transform = 'translateX(-100%)';

            var prevIdx = (current - 1 + viewPhotos.length) % viewPhotos.length;
            var nextIdx = (current + 1) % viewPhotos.length;

            loadSlide(slides[0], viewPhotos.length > 1 ? prevIdx : -1);
            loadSlide(slides[1], current);
            loadSlide(slides[2], viewPhotos.length > 1 ? nextIdx : -1);
        }

        function showInstant(i) {
            current = (i + viewPhotos.length) % viewPhotos.length;
            positionSlides(false);
            updateMeta();
            updateDots();
            preload((current + 1) % viewPhotos.length);
            preload((current - 1 + viewPhotos.length) % viewPhotos.length);
        }

        function slideTo(i) {
            if (sliding || viewPhotos.length <= 1) return;
            var target = (i + viewPhotos.length) % viewPhotos.length;
            if (target === current) return;

            sliding = true;
            var direction = 0;
            // Determine slide direction
            if (target === (current + 1) % viewPhotos.length) {
                direction = 1; // slide left (next)
            } else if (target === (current - 1 + viewPhotos.length) % viewPhotos.length) {
                direction = -1; // slide right (prev)
            } else {
                // jump — no animation for non-adjacent
                current = target;
                positionSlides(false);
                updateMeta();
                updateDots();
                sliding = false;
                return;
            }

            // Animate: slide the track
            var dur = prefersReduced ? '0s' : '0.4s';
            lbTrack.style.transition = 'transform ' + dur + ' cubic-bezier(0.22, 0.61, 0.36, 1)';
            if (direction === 1) {
                lbTrack.style.transform = 'translateX(-200%)';
            } else {
                lbTrack.style.transform = 'translateX(0%)';
            }

            current = target;
            updateMeta();
            updateDots();

            setTimeout(function () {
                positionSlides(false);
                sliding = false;
            }, prefersReduced ? 10 : 420);
        }

        function next() { slideTo((current + 1) % viewPhotos.length); }
        function prev() { slideTo((current - 1 + viewPhotos.length) % viewPhotos.length); }

        function openLightbox(i) {
            lastFocused = document.activeElement;
            buildDots();
            showInstant(i);
            lb.classList.add('is-open');
            lb.setAttribute('aria-hidden', 'false');
            document.body.classList.add('pg-lb-open');
            lbClose.focus();
        }
        function closeLightbox() {
            lb.classList.remove('is-open');
            lb.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('pg-lb-open');
            setTimeout(function () {
                if (!lb.classList.contains('is-open')) {
                    slides.forEach(function(s) { s.src = ''; });
                }
            }, 320);
            if (lastFocused && lastFocused.focus) lastFocused.focus();
        }

        // Click on center image to zoom
        slides[1].addEventListener('click', function (e) {
            e.stopPropagation();
            var isZoomed = slides[1].classList.contains('is-zoomed');
            if (isZoomed) {
                slides[1].classList.remove('is-zoomed');
                slides[1].style.transform = '';
                slides[1].style.transformOrigin = '';
                return;
            }
            var r = slides[1].getBoundingClientRect();
            var x = ((e.clientX - r.left) / r.width) * 100;
            var y = ((e.clientY - r.top) / r.height) * 100;
            slides[1].style.transformOrigin = x + '% ' + y + '%';
            slides[1].style.transform = 'scale(2.2)';
            slides[1].classList.add('is-zoomed');
        });

        lbClose.addEventListener('click', closeLightbox);
        lbNext.addEventListener('click', function (e) { e.stopPropagation(); next(); });
        lbPrev.addEventListener('click', function (e) { e.stopPropagation(); prev(); });
        lb.addEventListener('click', function (e) {
            if (e.target === lb || e.target === lbStage || e.target === lbTrack) closeLightbox();
        });

        document.addEventListener('keydown', function (e) {
            if (!lb.classList.contains('is-open')) return;
            if (e.key === 'Escape') closeLightbox();
            else if (e.key === 'ArrowRight') next();
            else if (e.key === 'ArrowLeft') prev();
        });

        // Touch swipe
        var tx = null, ty = null;
        lb.addEventListener('touchstart', function (e) {
            if (e.touches.length !== 1) return;
            tx = e.touches[0].clientX; ty = e.touches[0].clientY;
        }, { passive: true });
        lb.addEventListener('touchend', function (e) {
            if (tx === null) return;
            var t = e.changedTouches[0];
            var dx = t.clientX - tx, dy = t.clientY - ty;
            tx = ty = null;
            if (slides[1].classList.contains('is-zoomed')) return;
            if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) { dx < 0 ? next() : prev(); }
            else if (dy > 100 && Math.abs(dy) > Math.abs(dx)) { closeLightbox(); }
        }, { passive: true });

        // ----- reveal-on-scroll -----
        var io = ('IntersectionObserver' in window) ? new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-in');
                    io.unobserve(entry.target);
                }
            });
        }, { rootMargin: '0px 0px -6% 0px', threshold: 0.04 }) : null;

        function buildTile(p, index) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'pg-card' + (isFresh(p) ? ' is-fresh' : '');
            btn.setAttribute('aria-label', 'View photo' + (p.caption ? ': ' + p.caption : ' ' + (index + 1)));

            var img = document.createElement('img');
            img.src = p.src;
            img.alt = p.caption || '';
            img.loading = 'lazy';
            img.decoding = 'async';
            btn.appendChild(img);

            if (isNew(p)) {
                var badge = document.createElement('span');
                badge.className = 'pg-badge';
                badge.textContent = 'New';
                btn.appendChild(badge);
            }

            var hint = document.createElement('span');
            hint.className = 'pg-zoom-hint';
            hint.setAttribute('aria-hidden', 'true');
            hint.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>';
            btn.appendChild(hint);

            if (p.caption) {
                var cap = document.createElement('figcaption');
                cap.className = 'pg-cap';
                cap.textContent = p.caption;
                btn.appendChild(cap);
            }

            btn.addEventListener('click', function () { openLightbox(index); });

            if (io && !prefersReduced) {
                btn.style.transitionDelay = (Math.min(index, 8) * 0.05) + 's';
                io.observe(btn);
            } else {
                btn.classList.add('is-in');
            }
            return btn;
        }

        // ----- "+" Add Photo button -----
        function buildAddBtn() {
            var btn = document.createElement('a');
            btn.href = 'manage/';
            btn.className = 'pg-card pg-add-card is-in';
            btn.setAttribute('aria-label', 'Add more photographs');
            btn.innerHTML =
                '<div class="pg-add-inner">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="pg-add-icon"><path d="M12 5v14M5 12h14"/></svg>' +
                    '<span class="pg-add-label">Add Photos</span>' +
                '</div>';
            return btn;
        }

        // ----- grid rendering (filtered) -----
        function buildGrid(list) {
            grid.innerHTML = '';
            var frag = document.createDocumentFragment();
            list.forEach(function (p, i) { frag.appendChild(buildTile(p, i)); });
            frag.appendChild(buildAddBtn());
            grid.appendChild(frag);
        }

        function setFilter(tag) {
            activeTag = tag;
            viewPhotos = (tag === 'All') ? allPhotos.slice()
                : allPhotos.filter(function (p) { return (p.tags || []).indexOf(tag) > -1; });
            Array.prototype.forEach.call(filtersEl.children, function (chip) {
                var on = chip.getAttribute('data-tag') === tag;
                chip.classList.toggle('is-active', on);
                chip.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            buildGrid(viewPhotos);
        }

        // ----- album filter chips -----
        function buildFilters() {
            var counts = {};
            allPhotos.forEach(function (p) {
                (p.tags || []).forEach(function (t) { counts[t] = (counts[t] || 0) + 1; });
            });
            var tags = Object.keys(counts).sort(function (a, b) {
                return counts[b] - counts[a] || a.localeCompare(b);
            });
            if (!tags.length) return;
            var ordered = ['All'].concat(tags);
            ordered.forEach(function (t) {
                var chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'pg-chip' + (t === 'All' ? ' is-active' : '');
                chip.setAttribute('role', 'tab');
                chip.setAttribute('data-tag', t);
                chip.setAttribute('aria-selected', t === 'All' ? 'true' : 'false');
                var n = (t === 'All') ? allPhotos.length : counts[t];
                chip.innerHTML = t + '<span class="pg-chip-count">' + n + '</span>';
                chip.addEventListener('click', function () { setFilter(t); });
                filtersEl.appendChild(chip);
            });
        }

        // ----- featured spotlight (rotates daily) -----
        function buildSpotlight() {
            if (!allPhotos.length) return;
            var idx = Math.floor(Date.now() / DAY) % allPhotos.length;
            var p = allPhotos[idx];
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'pg-spotlight';
            btn.setAttribute('aria-label', 'Open featured photo' + (p.caption ? ': ' + p.caption : ''));
            btn.innerHTML =
                '<img src="' + p.src + '" alt="' + (p.caption || 'Featured photograph').replace(/"/g, '&quot;') + '" decoding="async">' +
                '<div class="pg-spotlight-body">' +
                  '<p class="pg-spotlight-eyebrow">Photo of the Day</p>' +
                  '<p class="pg-spotlight-cap">' + (p.caption || 'A moment worth returning to.') + '</p>' +
                  '<p class="pg-spotlight-date">' + relDate(p.uploaded) + '</p>' +
                '</div>';
            btn.addEventListener('click', function () {
                if (activeTag !== 'All') setFilter('All');
                var i = viewPhotos.indexOf(p);
                openLightbox(i > -1 ? i : 0);
            });
            spotlightHost.appendChild(btn);
        }

        // ----- "new since your last visit" banner -----
        function buildNewsflash() {
            var freshCount = allPhotos.filter(isFresh).length;
            if (freshCount <= 0) return;
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'pg-newsflash';
            b.innerHTML = '<span class="pg-spark">\u2726</span> <span><strong>' + freshCount +
                '</strong> new ' + (freshCount === 1 ? 'photograph' : 'photographs') +
                ' since your last visit</span>';
            b.addEventListener('click', function () {
                if (activeTag !== 'All') setFilter('All');
                var fresh = grid.querySelector('.pg-card.is-fresh');
                if (fresh) fresh.scrollIntoView({ behavior: prefersReduced ? 'auto' : 'smooth', block: 'center' });
            });
            newsflashEl.appendChild(b);
        }

        // ----- load manifest -----
        fetch('gallery/manifest.json?cb=' + Date.now())
            .then(function (r) {
                if (!r.ok) throw new Error('Failed to load gallery (' + r.status + ').');
                return r.json();
            })
            .then(function (data) {
                allPhotos = ((data && data.photos) || []).slice().reverse();
                if (!allPhotos.length) { setStatus('No photographs yet \u2014 check back soon.'); return; }
                countEl.textContent = allPhotos.length + (allPhotos.length === 1 ? ' Photograph' : ' Photographs');

                buildNewsflash();
                buildSpotlight();
                buildFilters();
                setFilter('All');

                writeLastVisit(Date.now());
            })
            .catch(function (err) {
                console.error(err);
                setStatus('Couldn\u2019t load the gallery right now. Please try again later.', true);
            });
    })();
    </script>
